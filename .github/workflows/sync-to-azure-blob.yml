name: Sync Configs to Azure Blob Storage

on:
  push:
    branches:
      - main # Change this if your default branch is different (e.g., master)
    paths:
      - 'test artifacts/**.yaml'
      - 'test artifacts/**.yml'

# Required for OIDC authentication with Azure
permissions:
  id-token: write
  contents: read

jobs:
  sync-to-blob:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          
          # Use Azure Credentials (Service Principal secret
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true

      - name: Sync to Azure Blob Storage
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
              --destination ${{ secrets.AZURE_STORAGE_CONTAINER_NAME }} \
              --destination-path "prod-deployment-artifacts" \
              --source "test artifacts" \
              --pattern "*.yaml" \
              --overwrite \
              --auth-mode login
