DEPLOYMENT:
  NUM_GPUS: 1
  GPU_IDS:
  - 0
  NUM_CAMERAS_PER_GPU: 24
  SHARED_VOLUME: /shared_volume/
  MOUNT_PATH: /shared_volume/
  RESTART_INTERVAL: 1
  SHARED_VOLUME_LOCAL_PATH: /home/invigilo/shared_volume/
  HITL: 1
  HITL_PLATFORM: Web
  SEND_INCIDENT: 0
  HYBRID_MODE: 1
  SEND_DIRECTLY_TO_BACKEND: 0
  AICAM2_HOST: 0.0.0.0
  AICAM2_PORT: 5005
  PORTS:
  - 5005
  TEST_MODE: 0
  
DEEPSTREAM:
  NUM_PIPELINES: 1
  PIPELINES:
  - C1V2
  SPLIT_GPU: 0
  TRACKER: 1
  SMART_RECORD: 1

  C1V2:
    UPDATED_TYPE: "latest"
    CUSTOM_PLUGIN:
      PRESENT: 1
      INDEXES:
        0:
          NAME: video-alert
          CONFIG_DATA:
          - alert-time-interval-pre: 7
          - alert-time-interval-post: 8
        9:
          NAME: person-under-load
          CONFIG_DATA:
          - length-of-track: 10
          - alert-cooldown: 20
          - alert-min-time: 5
          - alert-conf: 0.3
          - hoist-load-conf: 0.7
          - hook-block-conf: 0.7
          - hoist-scale-x: 0.55
          - hoist-scale-y: 1.0
          - line-points-num: 3
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
        20:
          NAME: fallen-person
          CONFIG_DATA:
          - length-of-track: 10
          - alert-cooldown: 20
          - alert-min-time: 10
          - alert-conf: 0.8
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 100

    CUSTOM_ENVIRONMENT_VARIABLES:
      PRESENT: 1
      NUM_CUSTOM_ENVIRONMENT_VARIABLES: 21
      INDEXES:
        0:
          NAME: CustomEnvironmentVariable
          CONFIG_DATA:
          - ENABLE_UNKNOWN_PERSON_FR: 0
          - ENABLE_BLACKLISTED_FR: 1
          - ENABLE_UNAUTHORIZED_FR: 1
          - FORCE_SMART_HITL: 1
          - ENABLE_PUL_CLASSIFIER: 1
          - ENABLE_PTM_HORIZON: 1
          - PTM_HORIZON_INTERSECTION: 1
          - PTM_AVERAGE_HEIGHT: 1.5
          - PTM_HORIZON_RADIUS: 1.5
          - LOG_LEVEL: 1
          - NUM_DAYS_CLEAR_LOG: 2
          - LONE_WORKER_ISOLATION_RADIUS_M: 30
          - ENABLE_CABIN_CHECK: 1
          - MINIMUM_PTM_BBOX_OVERLAP_PERCENTAGE: 0.9
          - NOT_SEND_IF_MACHINERY_OPERTAOR: 1
          - MINIMUM_NO_PPE_BBOX_OVERLAP_PERCENTAGE: 0.9
          - PUL_SCALE_TO_HOIST_SIZE: 0.0
          - SEND_IF_LOAD_ON_GROUND_LEVEL: 1
          - PUL_GROUND_RATIO_THRESHOLD: 0.5
          - SAFESITE_ENABLED: 0
          - BBOX_COLOUR: red
