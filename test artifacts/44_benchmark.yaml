DEPLOYMENT:
  NUM_GPUS: 1
  GPU_IDS: [0]
  NUM_CAMERAS_PER_GPU: 5
  SHARED_VOLUME: /shared_volume/
  MOUNT_PATH: /shared_volume/
  RESTART_INTERVAL: 1
  SHARED_VOLUME_LOCAL_PATH: /home/invigilo/shared_volume/
  HITL: 1 # 0: off , 1: on
  HITL_PLATFORM: "Telegram" # Telegram, Datapure
  SEND_INCIDENT: 0 # 0: off , 1: on
  HYBRID_MODE: 1 # 0: off , 1: on (if on, send to azure blob storage else send to minio)
  SEND_DIRECTLY_TO_BACKEND: 1 # 0: send to minio, 1: send directly to backend
  AICAM2_HOST: '0.0.0.0'
  AICAM2_PORT: 5000
  PORTS:
    - 5000
  TEST_MODE: 0 # 0: off , 1: on


DEEPSTREAM:
  NUM_PIPELINES: 1
  PIPELINES:
    - OOG
  SPLIT_GPU: 0  # 0: False (default), 1: True (if more than 1 gpu) // If True, each pipeline will be run on a separate GPU
  TRACKER: 1  # 0: False, 1: True

  OOG:
    VERSION: 6.3
    APP_ROOT: /opt/nvidia/deepstream/deepstream-6.3/sources/apps/sample_apps/deepstream-app/
    NUM_GPUS_PIPELINE: 1
    GPU_IDS_PIPELINE: [0]
    IMAGE: anandakumar1996/oog:v1.1.0
    STREAMMUX_RESOLUTION:
      - 1920 # width
      - 1080 # height
    SHARED_FOLDERS:
      - detections/
      - download_frames/
      - annotated_frames/

    PGIE:
      PRESENT: 1
      MODEL: megasaipem3_1920v5l_64e_8b_low_v2.onnx
      MODEL_INPUT_ID: input
      MODEL_INPUT_SIZE:
        - 1920 # width
        - 1920 # height
      NETWORK_TYPE: 0 # 0=Detector, 1=Classifier, 2=Segmentation, 3=Instance Segmentation
      LABELS: labels.txt
      CLASSES: 10
      INTERVAL: 4
      FILTER_OUT_CLASS_IDS: []
      NETWORK_TYPE_FUNC_NAME: NvDsInferParseYolo
      CUSTOM_LIB_PATH: /opt/nvidia/deepstream/deepstream-6.3/sources/apps/sample_apps/deepstream-app/nvdsinfer_custom_impl_Yolo/libnvdsinfer_custom_impl_Yolo.so
      PRE_CLUSTER_THRESHOLD: 0.45
      NMS_IOU_THRESHOLD: 0.25
      TOP_K: 300

    SGIE:
      PRESENT: 1
      NUM_SGIE: 1
      INDEXES:
        0:
          MODEL: helmet_strip_color.onnx
          MODEL_INPUT_ID: input
          MODEL_INPUT_SIZE:
            - 224 # width
            - 224 # height
          NETWORK_TYPE: 1 # 0=Detector, 1=Classifier, 2=Segmentation, 3=Instance Segmentation
          LABELS: labels2.txt
          CLASSES: 5
          INTERVAL: 0
          NETWORK_TYPE_FUNC_NAME: NvDsInferClassiferParseCustomSoftmax
          CUSTOM_LIB_PATH: /opt/nvidia/deepstream/deepstream-6.3/sources/apps/sample_apps/deepstream-app/nvdsinfer_customparser_helmet/libnvds_infercustomparser.so
          PRE_CLUSTER_THRESHOLD: 0.1
          NMS_IOU_THRESHOLD: 0.4
          OPERATE_ON_CLASS_IDS: [2]

          PREPROCESS:
            PRESENT: 0

    CUSTOM_PLUGIN:
      PRESENT: 0
      NUM_CUSTOM_PLUGIN: 0
    
    CUSTOM_ENVIRONMENT_VARIABLES:
      PRESENT: 1
      NUM_CUSTOM_ENVIRONMENT_VARIABLES: 1
      INDEXES:
        0:
          NAME: PGIE_CUSTOM_PLUGIN
          CONFIG_DATA:
          - variable_name1: variable_value1
          - variable_name2: variable_value2
