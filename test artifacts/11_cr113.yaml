DEPLOYMENT:
  NUM_GPUS: 2
  GPU_IDS:
  - 0
  - 1
  NUM_CAMERAS_PER_GPU: 11
  # 11 previously
  SHARED_VOLUME: /shared_volume/
  MOUNT_PATH: /shared_volume/
  RESTART_INTERVAL: 1
  SHARED_VOLUME_LOCAL_PATH: /home/invigilo/shared_volume/
  HITL: 1
  HITL_PLATFORM: Web
  SEND_INCIDENT: 0
  HYBRID_MODE: 1
  SEND_DIRECTLY_TO_BACKEND: 1
  AICAM2_HOST: 0.0.0.0
  AICAM2_PORT: 5005
  PORTS:
  - 5005
  TEST_MODE: 0
  

DEEPSTREAM:
  NUM_PIPELINES: 1
  PIPELINES:
  - C1V2
  SPLIT_GPU: 1
  TRACKER: 1
  SMART_RECORD: 1

  C1V2:
    VERSION: 7.0
    APP_ROOT: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/
    NUM_GPUS_PIPELINE: 2
    GPU_IDS_PIPELINE: [0,1]
    TRACKER:
      PRESENT: 1
      TRACKER_HEIGHT: 480
      TRACKER_WIDTH: 640
      TRACKER_LIB_FILE: /opt/nvidia/deepstream/deepstream/lib/libnvds_nvmultiobjecttracker.so
      TRACKER_CONFIG_FILE: /opt/nvidia/deepstream/deepstream/samples/configs/deepstream-app/config_tracker_NvDCF_perf.yml
      DISPLAY_TRACKING_ID: 1
      REID:
        ENABLED: 0
        PRECISION: 16
        CONFIGS:
          - config_tracker_NvDCF_accuracy_interval8_fp16.yml
        MODELS:
          - ghost_reid.onnx

    CUSTOM_PLUGIN:
      INDEXES:
        15:
          NAME: video-alert
          CONFIG_DATA: 
          - enabled: 0 # set 1 to enable. 0 by default

   