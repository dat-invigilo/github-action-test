DEPLOYMENT:
  NUM_GPUS: 1
  GPU_IDS:
  - 0
  NUM_CAMERAS_PER_GPU: 20
  SHARED_VOLUME: /shared_volume/
  MOUNT_PATH: /shared_volume/
  RESTART_INTERVAL: 1
  SHARED_VOLUME_LOCAL_PATH: /home/invigilo/shared_volume/
  HITL: 1
  HITL_PLATFORM: Web
  SEND_INCIDENT: 1
  HYBRID_MODE: 1
  SEND_DIRECTLY_TO_BACKEND: 1
  AICAM2_HOST: 0.0.0.0
  AICAM2_PORT: 5005
  PORTS:
  - 5005
  TEST_MODE: 0
DEEPSTREAM:
  NUM_PIPELINES: 1
  PIPELINES:
  - C1
  SPLIT_GPU: 1
  TRACKER: 1
  C1:
    VERSION: 6.3
    APP_ROOT: /opt/nvidia/deepstream/deepstream-6.3/sources/apps/sample_apps/deepstream-app/
    NUM_GPUS_PIPELINE: 1
    GPU_IDS_PIPELINE:
    - 0
    IMAGE: anandakumar1996/c1:v1.6.4
    STREAMMUX_RESOLUTION:
    - 1920
    - 1080
    SHARED_FOLDERS:
    - detections/
    - download_frames/
    - annotated_frames/
    PGIE:
      PRESENT: 1
      MODEL: megamodelv26_1920.onnx
      MODEL_INPUT_ID: input
      MODEL_INPUT_SIZE:
      - 1920
      - 1920
      NETWORK_TYPE: 0
      LABELS: labels.txt
      CLASSES: 40
      INTERVAL: 4
      FILTER_OUT_CLASS_IDS: [1, 3, 6, 9, 10, 11, 12, 13, 15, 16, 18, 19, 20, 24, 25,
        30, 31, 32, 33]
      NETWORK_TYPE_FUNC_NAME: NvDsInferParseYolo
      CUSTOM_LIB_PATH: /opt/nvidia/deepstream/deepstream-6.3/sources/apps/sample_apps/deepstream-app/nvdsinfer_custom_impl_Yolo/libnvdsinfer_custom_impl_Yolo.so
      PRE_CLUSTER_THRESHOLD: 0.65
      NMS_IOU_THRESHOLD: 0.45
      TOP_K: 300
    SGIE:
      PRESENT: 0
      NUM_SGIE: 0
    CUSTOM_PLUGIN:
      PRESENT: 1
      NUM_CUSTOM_PLUGIN: 1
      INDEXES:
        0:
          NAME: hitl
          CONFIG_DATA:
          - cam-ai-mapping-id: 10
          - ai-seq-mapping-id: 10
          - dumb-timer: 5
          - parser-url: testing.com
          - endpoint: testing
