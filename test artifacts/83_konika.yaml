DEPLOYMENT:
  NUM_GPUS: 1
  GPU_IDS: [0]
  NUM_CAMERAS_PER_GPU: 8
  SHARED_VOLUME: /shared_volume/
  MOUNT_PATH: /shared_volume/
  RESTART_INTERVAL: 1
  SHARED_VOLUME_LOCAL_PATH: /home/invigilo/shared_volume/
  HITL: 1 # 0: off , 1: on
  HITL_PLATFORM: "Web" # Telegram, Datapure
  SEND_INCIDENT: 0 # 0: off , 1: on
  HYBRID_MODE: 1 # 0: off , 1: on (if on, send to azure blob storage else send to minio)
  SEND_DIRECTLY_TO_BACKEND: 1 # 0: send to minio, 1: send directly to backend
  AICAM2_HOST: '0.0.0.0'
  AICAM2_PORT: 5000
  PORTS:
    - 5000
  TEST_MODE: 0 # 0: off , 1: on
  MASK: 0

DEEPSTREAM:
  NUM_PIPELINES: 1
  PIPELINES:
  - M1
  SPLIT_GPU: 0
  TRACKER: 1
  M1:
    VERSION: 7.0
    APP_ROOT: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/
    NUM_GPUS_PIPELINE: 1
    GPU_IDS_PIPELINE:
    - 0
    IMAGE: anandakumar1996/m1:v1.9.2
    RX_SCALE: 10
    RY_SCALE: 5
    SKIP_FRAME: 15000
    STREAMMUX_RESOLUTION:
    - 1280
    - 720
    SHARED_FOLDERS:
    - detections/
    - download_frames/
    - annotated_frames/
    - video_data/
    NVBUF_MEMORY_TYPE: 3
    CUDADEC_MEMTYPE: 0
    NVBUF_STREAMUX_MEMORY_TYPE: 3
    VIDEO_STREAMING: 0

    TRACKER:
      PRESENT: 1
      TRACKER_HEIGHT: 480
      TRACKER_WIDTH: 640
      TRACKER_LIB_FILE: /opt/nvidia/deepstream/deepstream/lib/libnvds_nvmultiobjecttracker.so
      TRACKER_CONFIG_FILE: /opt/nvidia/deepstream/deepstream/samples/configs/deepstream-app/config_tracker_NvDCF_perf.yml
      DISPLAY_TRACKING_ID: 1


    PGIE:
      PRESENT: 1
      MODEL: weights/week34_m1_yolov8l_60e_last.onnx
      MODEL_INPUT_ID: input
      MODEL_INPUT_SIZE:
      - 1920
      - 1920
      NETWORK_TYPE: 0
      LABELS: config/labels/labels.txt
      CLASSES: 27
      INTERVAL: 4
      FILTER_OUT_CLASS_IDS: []
      NETWORK_TYPE_FUNC_NAME: NvDsInferParseYolo
      CUSTOM_LIB_PATH: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/custom_lib/nvdsinfer_custom_impl_Yolo/libnvdsinfer_custom_impl_Yolo.so
      PRE_CLUSTER_THRESHOLD: 0.2
      NMS_IOU_THRESHOLD: 0.3
      TOP_K: 300
      VIDEO_STREAMING: 0
    SGIE:
      PRESENT: 1
      NUM_SGIE: 2
      INDEXES:
        0:
          MODEL: weights/color_classifier_v1.onnx
          MODEL_INPUT_ID: input
          MODEL_INPUT_SIZE:
          - 112
          - 112
          NETWORK_TYPE: 1
          LABELS: config/labels/labels_color_classifier.txt
          CLASSES: 2
          INTERVAL: 0
          NETWORK_TYPE_FUNC_NAME: NvDsInferClassiferParseCustomSoftmax
          CUSTOM_LIB_PATH: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/custom_lib/nvdsinfer_custom_color_classifier/libnvds_infercustomparser.so
          PRE_CLUSTER_THRESHOLD: 0.3
          NMS_IOU_THRESHOLD: 0.4
          OPERATE_ON_CLASS_IDS:
          - 25
          BATCH_SIZE: 1
          PREPROCESS:
            PRESENT: 0
        1:
          MODEL: weights/fallen_person4.onnx
          MODEL_INPUT_ID: input
          MODEL_INPUT_SIZE:
          - 224
          - 224
          NETWORK_TYPE: 1
          LABELS: config/labels/labels_fallen_person.txt
          CLASSES: 3
          INTERVAL: 0
          NETWORK_TYPE_FUNC_NAME: NvDsInferClassiferParseCustomSoftmax
          CUSTOM_LIB_PATH: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/custom_lib/nvdsinfer_custom_fallen_person/libnvds_infercustomparser.so
          PRE_CLUSTER_THRESHOLD: 0.25S
          NMS_IOU_THRESHOLD: 0.4
          OPERATE_ON_CLASS_IDS:
          - 0
          PREPROCESS:
            PRESENT: 0
    CUSTOM_PLUGIN:
      PRESENT: 1
      NUM_CUSTOM_PLUGIN: 21
      INDEXES:
        0:
          NAME: hitl
          CONFIG_DATA:
          - cam-ai-mapping-id: 10
          - ai-seq-mapping-id: 10
          - dumb-timer: 5000
          - parser-url: testing.com
          - endpoint: testing

        1:
          NAME: video-alert
          CONFIG_DATA:
          - enabled: 1
          - max-buffer-size: 300
          - alert-time-interval: 5
          - width: 640
          - height: 360
          - fps-n: 25

        2:
          NAME: excavated-site-barricades
          CONFIG_DATA:
          - time-skip: 1
          - bbox-scaling-factor: 0.8
          - grid-size: 3

        3:
          NAME: vlm-prompts
          CONFIG_DATA:
          - prompt: excavated site;

        4:
          NAME: black-chemical-bottle-cap
          CONFIG_DATA:
          - length-of-track: 10
          - alert-cooldown-period: 5
          - alert-min-age: 5
          - alert-conf: 0.5
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached_frames: 100

        5:
          NAME: fallen-person
          CONFIG_DATA:
          - length-of-track: 10
          - alert-cooldown-period: 5
