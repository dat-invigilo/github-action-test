M1:
  VERSION: 7.0
  APP_ROOT: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/
  NUM_GPUS_PIPELINE: 1
  GPU_IDS_PIPELINE:
  - 0
  IMAGE: anandakumar1996/m1:v1.13.6.1
  RX_SCALE: 10
  RY_SCALE: 5
  SKIP_FRAME: 15000
  STREAMMUX_RESOLUTION:
  - 1280
  - 720
  SHARED_FOLDERS:
  - detections/
  - download_frames/
  - annotated_frames/
  - video_data/
  - logs/
  - debug_frames/
  REPEATED: 1
  NVBUF_MEMORY_TYPE: 3
  CUDADEC_MEMTYPE: 0
  NVBUF_STREAMUX_MEMORY_TYPE: 3
  VIDEO_STREAMING: 0
  PREFIX_RUN_COMMAND: ["python3 fastfp_server.py", "python3 scripts/clear_logs.py"]

  TRACKER:
    PRESENT: 1
    TRACKER_HEIGHT: 480
    TRACKER_WIDTH: 640
    TRACKER_LIB_FILE: /opt/nvidia/deepstream/deepstream/lib/libnvds_nvmultiobjecttracker.so
    TRACKER_CONFIG_FILE: /opt/nvidia/deepstream/deepstream/samples/configs/deepstream-app/config_tracker_NvDCF_perf.yml
    DISPLAY_TRACKING_ID: 1
    REID:
      ENABLED: 0
      PRECISION: 16
      CONFIGS:
        - config_tracker_NvDCF_accuracy_interval8_fp16.yml
      MODELS:
        - ghost_reid.onnx


  PGIE:
    PRESENT: 1
    MODEL: weights/week47_m1_yolov5m_1920_60e_last.onnx
    MODEL_INPUT_ID: input
    MODEL_INPUT_SIZE:
    - 1920
    - 1920
    NETWORK_TYPE: 0
    LABELS: config/labels/labels.txt
    CLASSES: 29
    INTERVAL: 2
    FILTER_OUT_CLASS_IDS: []
    NETWORK_TYPE_FUNC_NAME: NvDsInferParseYolo
    CUSTOM_LIB_PATH: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/custom_lib/nvdsinfer_custom_impl_Yolo/libnvdsinfer_custom_impl_Yolo.so
    PRE_CLUSTER_THRESHOLD: 0.5
    NMS_IOU_THRESHOLD: 0.3
    TOP_K: 300
    VIDEO_STREAMING: 0
  SGIE:
    PRESENT: 1
    NUM_SGIE: 2
    INDEXES:
      0:
        MODEL: weights/color_classifier_v4.onnx
        MODEL_INPUT_ID: input
        MODEL_INPUT_SIZE:
        - 112
        - 112
        NETWORK_TYPE: 1
        LABELS: config/labels/labels_color_classifier.txt
        CLASSES: 2
        INTERVAL: 0
        INPUT_TENSOR_META: 0
        NETWORK_TYPE_FUNC_NAME: NvDsInferClassiferParseCustomSoftmax
        CUSTOM_LIB_PATH: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/custom_lib/nvdsinfer_custom_color_classifier/libnvds_infercustomparser.so
        PRE_CLUSTER_THRESHOLD: 0.3
        NMS_IOU_THRESHOLD: 0.4
        OPERATE_ON_CLASS_IDS:
        - 25
        BATCH_SIZE: 1
        PREPROCESS:
          PRESENT: 0
      1:
        MODEL: weights/fallen_person6.onnx
        MODEL_INPUT_ID: input
        MODEL_INPUT_SIZE:
        - 224
        - 224
        NETWORK_TYPE: 1
        LABELS: config/labels/labels_fallen_person.txt
        CLASSES: 3
        INTERVAL: 0
        NETWORK_TYPE_FUNC_NAME: NvDsInferClassiferParseCustomSoftmax
        CUSTOM_LIB_PATH: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/custom_lib/nvdsinfer_custom_fallen_person/libnvds_infercustomparser.so
        PRE_CLUSTER_THRESHOLD: 0.8
        NMS_IOU_THRESHOLD: 0.4
        OPERATE_ON_CLASS_IDS:
        - 0
        PREPROCESS:
          PRESENT: 0
  CUSTOM_PLUGIN:
    PRESENT: 1
    NUM_CUSTOM_PLUGIN: 22
    INDEXES:
      0:
        NAME: hitl
        CONFIG_DATA:
        - cam-ai-mapping-id: 10
        - ai-seq-mapping-id: 10
        - dumb-timer: 5000
        - parser-url: testing.com
        - endpoint: testing

      1:
        NAME: video-alert
        CONFIG_DATA:
        - enabled: 0
        - max-buffer-size: 150
        - alert-time-interval-pre: 5
        - alert-time-interval-post: 5
        - dimensions-scale: 1 
        - width: 1280
        - height: 720
        - fps-n: 25
        - playback-speed: 1

      2:
        NAME: excavated-site-barricades
        CONFIG_DATA:
        - time-skip: 1
        - bbox-scaling-factor: 0.8
        - grid-size: 3

      3:
        NAME: vlm-prompts
        CONFIG_DATA:
        - prompt: excavated site;

      4:
        NAME: black-chemical-bottle-cap
        CONFIG_DATA:
        - length-of-track: 10
        - alert-cooldown-period: 5
        - alert-min-age: 5
        - alert-conf: 0.5
        - chemical-bottle-conf: 0.4
        - chemical-bottle-cap-conf: 0.4 
        - source-tracker-cached-frames: 100
        - source-alertc-cached-frames: 100000
        - source-person-tracker-cached_frames: 100

      5:
        NAME: fallen-person
        CONFIG_DATA:
        - length-of-track: 10
        - alert-cooldown-period: 5
        - alert-min-age: 5
        - alert-conf: 0.8
        - source-tracker-cached-frames: 100
