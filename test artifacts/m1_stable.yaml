  CUSTOM_ENVIRONMENT_VARIABLES:
    PRESENT: 1
    NUM_CUSTOM_ENVIRONMENT_VARIABLES: 6
    INDEXES:
      0:
        NAME: CustomEnvironmentVariable
        CONFIG_DATA:
        - LOG_LEVEL: 1
