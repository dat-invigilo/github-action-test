DEPLOYMENT:
  NUM_GPUS: 1
  GPU_IDS:
  - 0
  NUM_CAMERAS_PER_GPU: 10
  SHARED_VOLUME: /shared_volume/
  MOUNT_PATH: /shared_volume/
  RESTART_INTERVAL: 1
  SHARED_VOLUME_LOCAL_PATH: /home/invigilo/shared_volume/
  HITL: 0
  HITL_PLATFORM: Web
  SEND_INCIDENT: 1
  HYBRID_MODE: 1
  SEND_DIRECTLY_TO_BACKEND: 1
  AICAM2_HOST: 0.0.0.0
  AICAM2_PORT: 5000
  PORTS:
  - 5000
  TEST_MODE: 0
  SERVER_ACCESS_TOKEN: 9bdf2fdf-6ba0-49a0-87f6-8480de4610ae


DEEPSTREAM:
  NUM_PIPELINES: 2
  PIPELINES:
  - L1
  - L2
  SPLIT_GPU: 0
  TRACKER: 1
  SMART_RECORD: 0

  L1:
    VERSION: 7.0
    MASK: 1
    APP_ROOT: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/
    NUM_GPUS_PIPELINE: 1
    GPU_IDS_PIPELINE: [0]
    IMAGE: anandakumar1996/l1:v1.8.1
    STREAMMUX_RESOLUTION:
      - 1280 # width
      - 720 # height
    SHARED_FOLDERS:
      - detections/
      - download_frames/
      - annotated_frames/
      - video_data/
    VIDEO_STREAMING: 0
    NVBUF_MEMORY_TYPE: 3
    NVBUF_STREAMMUX_MEMORY_TYPE: 3

    TRACKER:
        PRESENT: 1
        TRACKER_HEIGHT: 480
        TRACKER_WIDTH: 640
        TRACKER_LIB_FILE: /opt/nvidia/deepstream/deepstream/lib/libnvds_nvmultiobjecttracker.so
        TRACKER_CONFIG_FILE: /opt/nvidia/deepstream/deepstream/samples/configs/deepstream-app/config_tracker_NvDCF_perf.yml
        DISPLAY_TRACKING_ID: 1
 
    PGIE:
      PRESENT: 1
      MODEL: weights/week34_l1_yolov8l_60e_last.onnx
      MODEL_INPUT_ID: input
      MODEL_INPUT_SIZE:
        - 1920 # width
        - 1920 # height
      NETWORK_TYPE: 0 # 0=Detector, 1=Classifier, 2=Segmentation, 3=Instance Segmentation
      LABELS: config/labels/labels.txt
      CLASSES: 26
      INTERVAL: 4
      FILTER_OUT_CLASS_IDS: [1,3,4,8,9,10,11,12,14,20,21,23,24,25]
      NETWORK_TYPE_FUNC_NAME: NvDsInferParseYolo
      CUSTOM_LIB_PATH: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/custom_lib/nvdsinfer_custom_impl_Yolo/libnvdsinfer_custom_impl_Yolo.so
      PRE_CLUSTER_THRESHOLD: 0.2
      NMS_IOU_THRESHOLD: 0.5
      TOP_K: 300
      VIDEO_STREAMING: 0
      REPEATED: 1
      RX_SCALE: 3
      RY_SCALE: 3
      SKIP_FRAME: 1
 
    SGIE:
      PRESENT: 1
      NUM_SGIE: 1
      INDEXES:
        0:
          MODEL: weights/fallen_person3.onnx
          MODEL_INPUT_ID: input
          MODEL_INPUT_SIZE:
            - 224 # width
            - 224 # height
          NETWORK_TYPE: 1 # 0=Detector, 1=Classifier, 2=Segmentation, 3=Instance Segmentation
          LABELS: config/labels/labels_fallen_person.txt
          CLASSES: 3
          INTERVAL: 0
          NETWORK_TYPE_FUNC_NAME: NvDsInferClassiferParseCustomSoftmax
          CUSTOM_LIB_PATH: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/custom_lib/nvdsinfer_custom_fallen_person/libnvds_infercustomparser.so
          CLASSIFIER_THRESHOLD: 0.7
          NMS_IOU_THRESHOLD: 0.4
          OPERATE_ON_CLASS_IDS: [0]
 
          PREPROCESS:
            PRESENT: 0
 
    CUSTOM_PLUGIN:
      PRESENT: 1
      NUM_CUSTOM_PLUGIN: 18
      INDEXES:
        0:
          NAME: hitl
          CONFIG_DATA:
          - cam-ai-mapping-id: 10
          - ai-seq-mapping-id: 10
          - dumb-timer: 1
          - parser-url: testing.com
          - endpoint: testing
        1:
          NAME: tests
          CONFIG_DATA:
          - file-loop: 0
        2:
          NAME: excavated-site-barricades
          CONFIG_DATA:
          - time-skip: 1
          - bbox-scaling-factor: 0.8
          - grid-size: 3
        3:
          NAME: vlm-prompts
          CONFIG_DATA:
          - prompts: excavated sites;
        4:
          NAME: anomaly-monitoring
          CONFIG_DATA:
          - length-of-track: 10
          - alert-cooldown-period: 20
          - alert-min-age: 5
          - alert-conf: 0.3
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100
          - source-person-tracker-cached-frames: 100
        5:
          NAME: fallen-cargo
          CONFIG_DATA:
          - cargo-id: 15;16;17;18;19
          - length-of-track: 5
          - alert-cooldown-period: 20
          - alert-conf: 0.3
          - alert-min-distance: 200
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100
          - source-person-tracker-cached-frames: 100
        6: 
          NAME: fallen-person
          CONFIG_DATA:
          - length-of-track: 5
          - alert-cooldown-period: 20
          - alert-min-age: 5
          - alert-conf: 0.3
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 100
        7: 
          NAME: illegal-crossing
          CONFIG_DATA:
          - length-of-track: 10
          - alert-cooldown-period: 20
          - alert-min-age: 0
          - alert-conf: 0.3
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 100
        8: 
          NAME: jumping-off-edge
          CONFIG_DATA:
          - length-of-track: 5
          - alert-cooldown-period: 20
          - alert-min-age: 0
          - alert-conf: 0.3
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 100
        9: 
          NAME: lone-worker
          CONFIG_DATA:
          - length-of-track: 10
          - alert-frame-threshold: 10
          - alert-cooldown-period: 20
          - alert-min-age: 5
          - alert-conf: 0.3
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 100
        10: 
          NAME: no-hairnet
          CONFIG_DATA:
          - length-of-track: 10
          - alert-cooldown-period: 20
          - alert-min-age: 5
          - alert-conf: 0.5
          - source-tracker-cached-frames: 50
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 100
        11: 
          NAME: person-under-tailboard
          CONFIG_DATA:
          - length-of-track: 10
          - alert-cooldown-period: 20
          - alert-min-age: 5
          - alert-conf: 0.3
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 100
        12:
          NAME: no-vest
          CONFIG_DATA:
          - length-of-track: 10
          - alert-cooldown-period: 20
          - alert-min-age: 0
          - alert-conf: 0.3
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 100
        13:
          NAME: protruding-cargo
          CONFIG_DATA:
          - cargo-id: 15;16;17;18;19
          - length-of-track: 10
          - inference-interval: 100
          - alert-cooldown-period: 20
          - alert-conf: 0.3
          - alert-min-distance: 200
          - protrusion-threshold-percentage: 0.2
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 100
        14:
          NAME: proximity-to-machinery
          CONFIG_DATA:
          - machinery-classes: 5;6
          - length-of-track: 10
          - moving-threshold: 0
          - alert-distance-threshold: 150
          - alert-cooldown-period: 20
          - alert-min-age: 5
          - alert-conf: 0.1
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 100
          - source-machinery-tracker-cached-frames: 100
          - source-moving-machinery-tracker-cached-frames: 100
        15:
          NAME: red-zone
          CONFIG_DATA:
          - length-of-track: 10
          - alert-cooldown-period: 20
          - alert-min-age: 5
          - alert-conf: 0.3
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 100
        16:
          NAME: unattended-cargo
          CONFIG_DATA:
          - cargo-id: 15;16;17;18;19
          - length-of-track: 5
          - inference-interval: 100
          - alert-cooldown-period: 20
          - alert-conf: 0.3
          - alert-min-distance: 200
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100
          - source-person-tracker-cached-frames: 10
        17:
          NAME: video-alert
          CONFIG_DATA: 
          - enabled: 0 # set 1 to enable. 0 by default
          - max-buffer-size: 300 # Cache size to save historical frames
          - alert-time-interval: 5 # Duration of video post event
          - width: 640 # Frame width of video alert
          - height: 360 # Frame height of video alert
          - fps-n: 20 # saved video FPS

    CUSTOM_ENVIRONMENT_VARIABLES:
      PRESENT: 1
      NUM_CUSTOM_ENVIRONMENT_VARIABLES: 1
      INDEXES:
        0:
          NAME: CustomEnvironmentVariable
          CONFIG_DATA:
          - MASK: 0
  
  L2:
      VERSION: 7.0
      APP_ROOT: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/
      NUM_GPUS_PIPELINE: 1
      GPU_IDS_PIPELINE: [0]
      IMAGE: anandakumar1996/l2:dhl_v1.7.0
      STREAMMUX_RESOLUTION:
        - 1920 # width
        - 1080 # height
      SHARED_FOLDERS:
        - detections/
        - download_frames/
        - annotated_frames/
        - video_data/
      VIDEO_STREAMING: 0
      NVBUF_MEMORY_TYPE: 3
      NVBUF_STREAMMUX_MEMORY_TYPE: 3
      PREFIX_RUN_COMMAND: ["python3 scripts/clear_logs.py", "export GST_DEBUG=3"]

      TRACKER:
        PRESENT: 1
        TRACKER_HEIGHT: 480
        TRACKER_WIDTH: 640
        TRACKER_LIB_FILE: /opt/nvidia/deepstream/deepstream/lib/libnvds_nvmultiobjecttracker.so
        TRACKER_CONFIG_FILE: /opt/nvidia/deepstream/deepstream/samples/configs/deepstream-app/config_tracker_NvDCF_perf.yml
        DISPLAY_TRACKING_ID: 1
  
      PGIE:
        PRESENT: 1
        MODEL: weights/yolov8m-pose.onnx
        MODEL_INPUT_ID: input
        MODEL_INPUT_SIZE:
          - 640 # width
          - 640 # height
        NETWORK_TYPE: 3 # 0=Detector, 1=Classifier, 2=Segmentation, 3=Instance Segmentation
        LABELS: config/labels/labels.txt
        CLASSES: 1
        INTERVAL: 0
        FILTER_OUT_CLASS_IDS: []
        NETWORK_TYPE_FUNC_NAME: NvDsInferParseYoloPose
        CUSTOM_LIB_PATH: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/parsers/libnvdsinfer_custom_impl_Yolo_pose.so
        PRE_CLUSTER_THRESHOLD: 0.7
        NMS_IOU_THRESHOLD: 0.5
        TOP_K: 100
        VIDEO_STREAMING: 0
        REPEATED: 1
        RX_SCALE: 3
        RY_SCALE: 3
        SKIP_FRAME: 1
  
      SGIE:
        PRESENT: 1
        NUM_SGIE: 1
        INDEXES:
          0:
            MODEL: weights/lstm_model_v3.onnx
            MODEL_INPUT_ID: input
            MODEL_INPUT_SIZE:
              - 42 # width
              - 1 # height
            NETWORK_TYPE: 1 # 0=Detector, 1=Classifier, 2=Segmentation, 3=Instance Segmentation
            LABELS: config/labels/labels_lstm.txt
            CLASSES: 3
            INTERVAL: 0
            INPUT_TENSOR_META: 1
            NETWORK_TYPE_FUNC_NAME: NvDsParseCustomPoseClassification
            CUSTOM_LIB_PATH: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/parsers/lstm/lstm_parser.so
            CLASSIFIER_THRESHOLD: 0.7
            PRE_CLUSTER_THRESHOLD: 0.7
            NMS_IOU_THRESHOLD: 0.4
            OPERATE_ON_CLASS_IDS: [0]
  
            PREPROCESS:
              PRESENT: 0
  
      CUSTOM_PLUGIN:
        PRESENT: 1
        NUM_CUSTOM_PLUGIN: 5
        INDEXES:
          0:
            NAME: hitl
            CONFIG_DATA:
            - cam-ai-mapping-id: 10
            - ai-seq-mapping-id: 10
            - dumb-timer: 5
            - parser-url: testing.com
            - endpoint: testing
          1:
            NAME: secondary-pre-process0
            CONFIG_DATA:
            - enable: 1
            - operate-on-gie-id: 1
            - config-file: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/config/preprocess.txt
          2: 
            NAME: ergonomics
            CONFIG_DATA:
            - alert-cooldown-period: 2
            - streak-window-period: 2
            - streak-limit: 10
          3:
            NAME: tests
            CONFIG_DATA:
            - file-loop: 1       
          4: 
            NAME: video-alert
            CONFIG_DATA: 
            - enabled: 0 # set 1 to enable. 0 by default
            - max-buffer-size: 100 # Cache size to save historical frames
            - alert-time-interval: 5 # Duration of video post event
            - width: 300 # Frame width of video alert
            - height: 100 # Frame height of video alert
            - fps-n: 25 # saved video FPS

      CUSTOM_ENVIRONMENT_VARIABLES:
        PRESENT: 1
        NUM_CUSTOM_ENVIRONMENT_VARIABLES: 4
        INDEXES:
          0:
            NAME: CustomEnvironmentVariable
            CONFIG_DATA:
            - SKIP_NUM_MISSED_KEYPOINTS: 10
            - DEBUG_MODE: 0
            - LOG_LEVEL: 1
            - NUM_DAYS_CLEAR_LOG: 2