DEPLOYMENT:
  NUM_GPUS: 2
  GPU_IDS: [0,1]
  NUM_CAMERAS_PER_GPU: 15
  SHARED_VOLUME: /shared_volume/
  MOUNT_PATH: /shared_volume/
  RESTART_INTERVAL: 1
  SHARED_VOLUME_LOCAL_PATH: /home/invigilo/shared_volume/
  HITL: 0 # 0: off , 1: on
  HITL_PLATFORM: "Web" # Telegram, Datapure
  SEND_INCIDENT: 1 # 0: off , 1: on
  HYBRID_MODE: 1 # 0: off , 1: on (if on, send to azure blob storage else send to minio)
  SEND_DIRECTLY_TO_BACKEND: 1 # 0: send to minio, 1: send directly to backend
  AICAM2_HOST: '0.0.0.0'
  AICAM2_PORT: 5005
  PORTS:
    - 5005
  TEST_MODE: 0 # 0: off , 1: on
  MASK: 0

DEEPSTREAM:
  NUM_PIPELINES: 1
  PIPELINES:
  - C1V2
  SPLIT_GPU: 0
  TRACKER: 1
  SMART_RECORD: 1

  C1V2:
    NUM_GPUS_PIPELINE: 2
    GPU_IDS_PIPELINE: [0,1]
    UPDATED_TYPE: latest
    CUSTOM_ENVIRONMENT_VARIABLES:
      PRESENT: 1
      NUM_CUSTOM_ENVIRONMENT_VARIABLES: 25
      INDEXES:
        0:
          NAME: CustomEnvironmentVariable
          CONFIG_DATA:
            - ENABLE_UNKNOWN_PERSON_FR: 0
            - ENABLE_BLACKLISTED_FR: 1
            - ENABLE_UNAUTHORIZED_FR: 1
            - FORCE_SMART_HITL: 1
            - ENABLE_PUL_CLASSIFIER: 1
            - ENABLE_PTM_HORIZON: 1
            - PTM_HORIZON_INTERSECTION: 1
            - PTM_AVERAGE_HEIGHT: 1.5
            - PTM_HORIZON_RADIUS: 3.0
            - LOG_LEVEL: 1
            - NUM_DAYS_CLEAR_LOG: 2
            - LONE_WORKER_ISOLATION_RADIUS_M: 30
            - ENABLE_CABIN_CHECK: 1
            - MINIMUM_PTM_BBOX_OVERLAP_PERCENTAGE: 0.9
            - NOT_SEND_IF_MACHINERY_OPERTAOR: 1
            - MINIMUM_NO_PPE_BBOX_OVERLAP_PERCENTAGE: 0.9
            - PUL_SCALE_TO_HOIST_SIZE: 1
            - SEND_IF_LOAD_ON_GROUND_LEVEL: 1
            - PUL_GROUND_RATIO_THRESHOLD: 0.5
            - SAFESITE_ENABLED: 0
            - BBOX_COLOUR: red
            - PERCENTAGE_PERSON_COVERED: 0.2
            - FLOOR_COLOUR_THRESHOLD: 138.0
            - WITHIN_FLOOR_THRESHOLD: 50.0
            - ENABLE_CHECK_THREE: 0.0
