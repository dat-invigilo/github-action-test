DEPLOYMENT:
  NUM_GPUS: 1
  GPU_IDS:
  - 0
  NUM_CAMERAS_PER_GPU: 5
  SHARED_VOLUME: /shared_volume/
  MOUNT_PATH: /shared_volume/
  RESTART_INTERVAL: 1
  SHARED_VOLUME_LOCAL_PATH: /home/invigilo/shared_volume/
  HITL: 1
  HITL_PLATFORM: Web
  SEND_INCIDENT: 1
  HYBRID_MODE: 1
  SEND_DIRECTLY_TO_BACKEND: 1
  AICAM2_HOST: 0.0.0.0
  AICAM2_PORT: 5005
  PORTS:
  - 5005
  TEST_MODE: 0
DEEPSTREAM:
  NUM_PIPELINES: 1
  PIPELINES:
  - C1V2
  SPLIT_GPU: 0
  TRACKER: 1
  SMART_RECORD: 0
  C1V2:
    VERSION: 7.0
    APP_ROOT: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/
    NUM_GPUS_PIPELINE: 1
    GPU_IDS_PIPELINE:
    - 0
    IMAGE: anandakumar1996/c1v2:v2.0.5
    STREAMMUX_RESOLUTION:
    - 1920
    - 1080
    SHARED_FOLDERS:
    - detections/
    - download_frames/
    - annotated_frames/
    - debug_frames/
    - video_data/
    - logs/
    REPEATED: 1
    RX_SCALE: 3
    RY_SCALE: 3
    SKIP_FRAME: 3000
    NVBUF_MEMORY_TYPE: 3
    CUDADEC_MEMTYPE: 0
    NVBUF_STREAMMUX_MEMORY_TYPE: 3
    VIDEO_STREAMING: 0
    PREFIX_RUN_COMMAND:
    - python3 fastfr_server.py
    - python3 fastpul_server.py
    - python3 fastcabin_server.py
    - export GST_DEBUG=3
    - python3 scripts/clear_logs.py
    PGIE:
      PRESENT: 1
      MODEL: weights/week45_c1_yolov5m_1280_80e_last.onnx
      MODEL_INPUT_ID: input
      MODEL_INPUT_SIZE:
      - 1280
      - 1280
      NETWORK_TYPE: 0
      LABELS: config/labels/labels.txt
      CLASSES: 38
      INTERVAL: 2
      FILTER_OUT_CLASS_IDS:
      - 1
      - 3
      - 6
      - 9
      - 10
      - 12
      - 13
      - 15
      - 16
      - 18
      - 19
      - 24
      - 25
      - 30
      - 31
      NETWORK_TYPE_FUNC_NAME: NvDsInferParseYolo
      CUSTOM_LIB_PATH: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/custom_lib/nvdsinfer_custom_impl_Yolo/libnvdsinfer_custom_impl_Yolo.so
      PRE_CLUSTER_THRESHOLD: 0.4
      NMS_IOU_THRESHOLD: 0.5
      TOP_K: 300
      VIDEO_STREAMING: 0
    TRACKER:
      PRESENT: 1
      TRACKER_HEIGHT: 480
      TRACKER_WIDTH: 640
      TRACKER_LIB_FILE: /opt/nvidia/deepstream/deepstream/lib/libnvds_nvmultiobjecttracker.so
      TRACKER_CONFIG_FILE: /opt/nvidia/deepstream/deepstream/samples/configs/deepstream-app/config_tracker_NvDCF_perf.yml
      DISPLAY_TRACKING_ID: 1
      REID:
        ENABLED: 
          DEFAULT: 1
          GOVTECH: 0
        PRECISION: 16
        CONFIGS:
        - config_tracker_NvDCF_accuracy_interval8_fp16.yml
        MODELS:
        - ghost_reid.onnx
    SGIE:
      PRESENT: 0
      NUM_SGIE: 1
      INDEXES:
        0:
          MODEL: weights/fallen_person6.onnx
          MODEL_INPUT_ID: input
          MODEL_INPUT_SIZE:
          - 224
          - 224
          NETWORK_TYPE: 1
          LABELS: config/labels/labels_fallen_person.txt
          CLASSES: 3
          INTERVAL: 0
          INPUT_TENSOR_META: 0
          NETWORK_TYPE_FUNC_NAME: NvDsInferClassiferParseCustomSoftmax
          CUSTOM_LIB_PATH: /opt/nvidia/deepstream/deepstream-7.0/sources/apps/sample_apps/deepstream-app/custom_lib/nvdsinfer_custom_fallen_person/libnvds_infercustomparser.so
          PRE_CLUSTER_THRESHOLD: 0.75
          NMS_IOU_THRESHOLD: 0.4
          OPERATE_ON_CLASS_IDS:
          - 0
          PREPROCESS:
            PRESENT: 0
    CUSTOM_PLUGIN:
      PRESENT: 1
      NUM_CUSTOM_PLUGIN: 23
      INDEXES:
        0:
          NAME: hitl
          CONFIG_DATA:
          - cam-ai-mapping-id: 10
          - ai-seq-mapping-id: 10
          - dumb-timer: 5
          - parser-url: testing.com
          - endpoint: testing
        1:
          NAME: tests
          CONFIG_DATA:
          - file-loop: 0
        2:
          NAME: excavated-site-barricades
          CONFIG_DATA:
          - time-skip: 1
          - bbox-scaling-factor: 0.8
          - grid-size: 3
        3:
          NAME: vlm-prompts
          CONFIG_DATA:
          - prompts: excavated sites;
        4:
          NAME: a-frame-ladder
          CONFIG_DATA:
          - alert-min-time: 0
          - alert-conf: 0.5
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 100
        5:
          NAME: fire-smoke
          CONFIG_DATA:
          - length-of-track: 10
          - alert-cooldown: 20
          - alert-min-time: 0
          - alert-conf: 0.6
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 100
        6:
          NAME: lone-worker
          CONFIG_DATA:
          - time-threshold: 100
          - isolation-radius: 30
          - alert-cooldown: 1000
          - alert-min-time: 10
          - alert-conf: 0.6
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 100
        7:
          NAME: missing-barricade
          CONFIG_DATA:
          - length-of-track: 10
          - heavy-machineries-classes: excavator;mobile_crane;boom_lift;scissor_lift
          - class-conf-thresholds: 0.3;0.3;0.3;0.3
          - barricade-classes: barricade;guardrail
          - alert-cooldown: 20
          - alert-min-time: 5
          - alert-conf: 0.5
          - alert-time-interval: 1800
          - bbox-scaling-factor: 1.0
          - grid-size: 8
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 100
          - source-machinery-tracker-cached-frames: 100
        8:
          NAME: person-near-edge
          CONFIG_DATA:
          - length-of-track: 1
          - alert-cooldown: 20
          - alert-min-time: 5
          - alert-conf: 0.3
          - source-tracker-cached-frames: 50
          - source-alertc-cached-frames: 600
          - source-person-tracker-cached-frames: 700
          - distance-edge-threshold: 200
          - canny-threshold1: 600
          - canny-threshold2: 1200
          - canny-aperture-size: 5
          - min-contour-length: 100
          - min-contour-area: 100
          - dist-from-edge: 1.5
          - camera-fov: 100
          - camera-depth: 12.0
        9:
          NAME: person-under-load
          CONFIG_DATA:
          - length-of-track: 10
          - alert-cooldown: 20
          - alert-min-time: 5
          - alert-conf: 0.3
          - hoist-load-conf: 0.7
          - hook-block-conf: 0.7
          - hoist-scale-x: 0.55
          - hoist-scale-y: 1.0
          - line-points-num: 3
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
        10:
          NAME: no-helmet
          CONFIG_DATA:
          - alert-min-time: 3
          - alert-cooldown: 30
          - alert-conf: 0.4
          - source-tracker-cached-frames: 10
          - source-alertc-cached-frames: 10
          - source-person-tracker-cached-frames: 10
          - pixel-threshold: 10
        11:
          NAME: no-vest
          CONFIG_DATA:
          - alert-min-time: 3
          - alert-cooldown: 30
          - alert-conf: 0.4
          - source-tracker-cached-frames: 10
          - source-alertc-cached-frames: 10
          - source-person-tracker-cached-frames: 10
        12:
          NAME: proximity-to-machinery
          CONFIG_DATA:
          - machinery-classes: excavator;forklift;tractor;bulldozer;wheel_loader;boom_lift;scissor_lift;concrete_mixer_truck;heavy_machinery;dump_truck
          - class-conf-thresholds: 0.3;0.3;0.3;0.3;0.3;0.3;0.3;0.3;0.3;0.3
          - length-of-track: 10
          - alert-cooldown: 30
          - alert-min-time: 5
          - alert-conf: 0.4
          - proximity-threshold: 4.0
          - moving-sensitivity: 0.4
          - major-axis-scale: 4.0
          - minor-axis-scale: 4.0
          - fence-classes: null
          - source-tracker-cached-frames: 10000
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 10000
          - source-machinery-tracker-cached-frames: 10000
          - source-moving-machinery-tracker-cached-frames: 10000
        13:
          NAME: red-zone
          CONFIG_DATA:
          - length-of-track: 10
          - alert-cooldown: 20
          - alert-min-time: 10
          - alert-conf: 0.3
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 100
        14:
          NAME: person-uwah
          CONFIG_DATA:
          - iou-threshold: 0.01
          - alert-cooldown: 20
          - alert-min-time: 5
          - alert-conf: 0.5
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
        15:
          NAME: video-alert
          CONFIG_DATA:
          - enabled: 1
          - max-buffer-size: 200
          - alert-time-interval-pre: 5
          - alert-time-interval-post: 5
          - dimensions-scale: 1
          - playback-speed: 1
          - width: 640
          - height: 480
          - fps-n: 25
          - enable-overlays: 1
        16:
          NAME: unattended-cargo
          CONFIG_DATA:
          - cargo-id: 15;16;17;18;19
          - length-of-track: 5
          - inference-interval: 100
          - alert-cooldown: 20
          - alert-conf: 0.3
          - alert-min-distance: 200
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100
          - source-person-tracker-cached-frames: 10
        17:
          NAME: face-recognition
          CONFIG_DATA:
          - alert-min-time: 1
        18:
          NAME: machinery-obstruction
          CONFIG_DATA:
          - machineries-classes: excavator;mobile_crane;forklift;tractor;bulldozer;wheel_loader;boom_lift;scissor_lift;concrete_mixer_truck
          - class-conf-thresholds: 0.3;0.3;0.3;0.3;0.3;0.3;0.3;0.3;0.3
          - alert-min-time: 5
        19:
          NAME: vehicle-overspeeding
          CONFIG_DATA:
          - machineries-classes: excavator;mobile_crane;forklift;tractor;bulldozer;wheel_loader;boom_lift;scissor_lift;concrete_mixer_truck
          - class-conf-thresholds: 0.3;0.3;0.3;0.3;0.3;0.3;0.3;0.3;0.3
          - length-of-track: 4
          - alert-conf: 0.5
          - overspeeding-threshold: 3
          - source-alertc-cached-frames: 10000
          - source-machinery-tracker-cached-frames: 10000
          - machinery-height: 5
        20:
          NAME: fallen-person
          CONFIG_DATA:
          - length-of-track: 10
          - alert-cooldown: 20
          - alert-min-time: 10
          - alert-conf: 0.8
          - source-tracker-cached-frames: 100
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 100
        21:
          NAME: osd-extras
          CONFIG_DATA:
          - enable-conf-display: 1
        22:
          NAME: open-edge
          CONFIG_DATA:
          - alert-cooldown: 5
          - source-tracker-cached-frames: 100000
          - source-alertc-cached-frames: 100000
          - source-person-tracker-cached-frames: 100000
          - distance-edge-threshold: 150
          - canny-threshold1: 200
          - canny-threshold2: 1000
          - canny-aperture-size: 5
          - min-contour-length: 10
          - min-contour-area: 50

    CUSTOM_ENVIRONMENT_VARIABLES:
      PRESENT: 1
      NUM_CUSTOM_ENVIRONMENT_VARIABLES: 21
      INDEXES:
        0:
          NAME: CustomEnvironmentVariable
          CONFIG_DATA:
          - ENABLE_UNKNOWN_PERSON_FR: 0
          - ENABLE_BLACKLISTED_FR: 1
          - ENABLE_UNAUTHORIZED_FR: 1
          - FORCE_SMART_HITL: 1
          - ENABLE_PUL_CLASSIFIER: 1
          - ENABLE_PTM_HORIZON: 1
          - PTM_HORIZON_INTERSECTION: 1
          - PTM_AVERAGE_HEIGHT: 1.5
          - PTM_HORIZON_RADIUS: 1.5
          - LOG_LEVEL: 1
          - NUM_DAYS_CLEAR_LOG: 2
          - LONE_WORKER_ISOLATION_RADIUS_M: 30
          - ENABLE_CABIN_CHECK: 0
          - MINIMUM_PTM_BBOX_OVERLAP_PERCENTAGE: 0.9
          - NOT_SEND_IF_MACHINERY_OPERTAOR: 0
          - MINIMUM_NO_PPE_BBOX_OVERLAP_PERCENTAGE: 0.9
          - PUL_SCALE_TO_HOIST_SIZE: 1
          - SEND_IF_LOAD_ON_GROUND_LEVEL: 1
          - PUL_GROUND_RATIO_THRESHOLD: 0.5
          - SAFESITE_ENABLED: 0
          - BBOX_COLOUR: red
